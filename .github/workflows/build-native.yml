name: Build SnowLuma Native

# Cross-repo build orchestrator triggered by SnowLuma/nnphook.
#
# Flow:
#   1. nnphook fires `repository_dispatch` (event_type = nnphook-native-build).
#   2. This workflow checks out the nnphook source at the requested ref.
#   3. Native artifacts are built in parallel on three runners:
#        - ubuntu-22.04        → snowluma-linux-x64.{node,so}
#        - ubuntu-22.04-arm    → snowluma-linux-arm64.{node,so}
#        - windows-2022        → snowluma-win32-x64.{node,dll}
#      Linux outputs come from the root CMake project (Ninja Release).
#      Windows outputs come from two pieces:
#        - `qq_hook_dll` target in the root CMake project → qq_hook.dll
#        - `src/windows/injector_addon` cmake-js project    → injector_addon.node
#      Both are renamed to the canonical `snowluma-win32-x64.{dll,node}`.
#   4. Results are published as a Release on this repository (SnowLumaNative).
#   5. Optionally, a Pull Request is opened against SnowLuma/SnowLuma replacing
#      `packages/runtime/native/snowluma-{linux-x64,linux-arm64,win32-x64}.{node,so,dll}`
#      (six files) with the freshly built artifacts.
#
# Required secrets (configure under repository or environment scope):
#   - SNOWLUMA_TOKEN              : PAT with `contents:read` on SnowLuma/nnphook,
#                                   used by build-native-linux / build-native-windows
#                                   to checkout the (private) source.
#   - SNOWLUMA_BOT_APP_ID         : numeric App ID of the "Snowluma Bot"
#                                   GitHub App.
#   - SNOWLUMA_BOT_PRIVATE_KEY    : PEM-encoded private key of the same App.
#                                   Together these mint a short-lived
#                                   installation token used by `open-snowluma-pr`
#                                   so the resulting PR shows up as
#                                   `<app-slug>[bot] opened …` and commits are
#                                   authored by the bot.
#
# The GitHub App must be installed on:
#   * SnowLuma/SnowLuma           - Contents: Read+Write, Pull requests: Read+Write
#                                   (push branch + open PR; only needed when
#                                    open_pr=true)
#   * SnowLuma/SnowLumaNative     - Metadata: Read (recommended; lets
#                                   create-github-app-token run inside this repo).
#
# `GITHUB_TOKEN` is enough to publish the Release on this repository (see
# the `permissions:` block on the `release` job).

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  repository_dispatch:
    types:
      - nnphook-native-build
  workflow_dispatch:
    inputs:
      nnphook_repository:
        description: nnphook source repository
        required: true
        default: SnowLuma/nnphook
      nnphook_ref:
        description: nnphook git ref (tag, branch, or SHA)
        required: true
        default: main
      release_tag:
        description: Release tag created on SnowLumaNative
        required: true
        default: native-latest
      open_pr:
        description: Open a SnowLuma PR replacing the native artifacts
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      snowluma_repository:
        description: SnowLuma framework repository (PR target)
        required: true
        default: SnowLuma/SnowLuma
      snowluma_base_branch:
        description: Base branch for the SnowLuma PR
        required: true
        default: main

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      nnphook_repository: ${{ steps.values.outputs.nnphook_repository }}
      nnphook_ref: ${{ steps.values.outputs.nnphook_ref }}
      release_tag: ${{ steps.values.outputs.release_tag }}
      open_pr: ${{ steps.values.outputs.open_pr }}
      snowluma_repository: ${{ steps.values.outputs.snowluma_repository }}
      snowluma_repository_owner: ${{ steps.values.outputs.snowluma_repository_owner }}
      snowluma_repository_name: ${{ steps.values.outputs.snowluma_repository_name }}
      snowluma_base_branch: ${{ steps.values.outputs.snowluma_base_branch }}
      trigger_run_url: ${{ steps.values.outputs.trigger_run_url }}
    steps:
      - name: Resolve inputs
        id: values
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_NNPHOOK_REPOSITORY: ${{ github.event.client_payload.nnphook_repository }}
          DISPATCH_NNPHOOK_REF: ${{ github.event.client_payload.nnphook_ref }}
          DISPATCH_RELEASE_TAG: ${{ github.event.client_payload.release_tag }}
          DISPATCH_OPEN_PR: ${{ github.event.client_payload.open_pr }}
          DISPATCH_SNOWLUMA_REPOSITORY: ${{ github.event.client_payload.snowluma_repository }}
          DISPATCH_SNOWLUMA_BRANCH: ${{ github.event.client_payload.snowluma_base_branch }}
          DISPATCH_TRIGGER_RUN_URL: ${{ github.event.client_payload.trigger_run_url }}
          INPUT_NNPHOOK_REPOSITORY: ${{ inputs.nnphook_repository }}
          INPUT_NNPHOOK_REF: ${{ inputs.nnphook_ref }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_OPEN_PR: ${{ inputs.open_pr }}
          INPUT_SNOWLUMA_REPOSITORY: ${{ inputs.snowluma_repository }}
          INPUT_SNOWLUMA_BRANCH: ${{ inputs.snowluma_base_branch }}
        run: |
          set -euo pipefail

          if [ "${EVENT_NAME}" = "repository_dispatch" ]; then
            nnphook_repository="${DISPATCH_NNPHOOK_REPOSITORY:-SnowLuma/nnphook}"
            nnphook_ref="${DISPATCH_NNPHOOK_REF:-main}"
            release_tag="${DISPATCH_RELEASE_TAG:-native-latest}"
            open_pr="${DISPATCH_OPEN_PR:-true}"
            snowluma_repository="${DISPATCH_SNOWLUMA_REPOSITORY:-SnowLuma/SnowLuma}"
            snowluma_base_branch="${DISPATCH_SNOWLUMA_BRANCH:-main}"
            trigger_run_url="${DISPATCH_TRIGGER_RUN_URL:-}"
          else
            nnphook_repository="${INPUT_NNPHOOK_REPOSITORY}"
            nnphook_ref="${INPUT_NNPHOOK_REF}"
            release_tag="${INPUT_RELEASE_TAG}"
            open_pr="${INPUT_OPEN_PR}"
            snowluma_repository="${INPUT_SNOWLUMA_REPOSITORY}"
            snowluma_base_branch="${INPUT_SNOWLUMA_BRANCH}"
            trigger_run_url=""
          fi

          for value in nnphook_repository nnphook_ref release_tag open_pr snowluma_repository snowluma_base_branch; do
            if [ -z "${!value}" ]; then
              echo "Missing required value: ${value}" >&2
              exit 1
            fi
            echo "${value}=${!value}" >> "${GITHUB_OUTPUT}"
          done
          echo "trigger_run_url=${trigger_run_url}" >> "${GITHUB_OUTPUT}"

          # Split snowluma_repository ("owner/name") into its components so the
          # PR job can scope the GitHub App installation token correctly.
          if [[ "${snowluma_repository}" != */* ]]; then
            echo "snowluma_repository must be in 'owner/name' form, got: ${snowluma_repository}" >&2
            exit 1
          fi
          snowluma_repository_owner="${snowluma_repository%%/*}"
          snowluma_repository_name="${snowluma_repository##*/}"
          {
            echo "snowluma_repository_owner=${snowluma_repository_owner}"
            echo "snowluma_repository_name=${snowluma_repository_name}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "## Resolved build inputs"
            echo
            echo "| Key | Value |"
            echo "| --- | --- |"
            echo "| nnphook_repository | \`${nnphook_repository}\` |"
            echo "| nnphook_ref | \`${nnphook_ref}\` |"
            echo "| release_tag | \`${release_tag}\` |"
            echo "| open_pr | \`${open_pr}\` |"
            echo "| snowluma_repository | \`${snowluma_repository}\` |"
            echo "| snowluma_base_branch | \`${snowluma_base_branch}\` |"
            if [ -n "${trigger_run_url}" ]; then
              echo "| trigger_run_url | ${trigger_run_url} |"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

  build-native-linux:
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            os: ubuntu-22.04
          - arch: arm64
            os: ubuntu-22.04-arm
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout nnphook source
        uses: actions/checkout@v6
        with:
          repository: ${{ needs.resolve.outputs.nnphook_repository }}
          ref: ${{ needs.resolve.outputs.nnphook_ref }}
          path: native
          token: ${{ secrets.SNOWLUMA_TOKEN || github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake ninja-build g++

      - name: Build Linux native outputs
        working-directory: native
        run: |
          set -euo pipefail
          node_include_dir="$(node -p "require('path').join(require('path').dirname(process.execPath), '..', 'include', 'node')")"
          cmake -S . -B build-linux -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DNODE_API_INCLUDE_DIR="${node_include_dir}"
          cmake --build build-linux
          test -f "build-linux/snowluma-linux-${{ matrix.arch }}.node"
          test -f "build-linux/snowluma-linux-${{ matrix.arch }}.so"

      - name: Verify stripped Linux native outputs
        working-directory: native
        run: |
          set -euo pipefail
          for file in "build-linux/snowluma-linux-${{ matrix.arch }}.node" "build-linux/snowluma-linux-${{ matrix.arch }}.so"; do
            file "${file}"
            if readelf -S "${file}" | grep -qE '\.(debug|symtab|strtab)'; then
              echo "Unexpected symbols or debug sections in ${file}" >&2
              exit 1
            fi
          done

      - name: Upload native outputs
        uses: actions/upload-artifact@v7
        with:
          name: native-linux-${{ matrix.arch }}
          path: |
            native/build-linux/snowluma-linux-${{ matrix.arch }}.node
            native/build-linux/snowluma-linux-${{ matrix.arch }}.so
          if-no-files-found: error
          retention-days: 7

  build-native-windows:
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            cmake_arch: x64
    runs-on: windows-2022
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout nnphook source
        uses: actions/checkout@v6
        with:
          repository: ${{ needs.resolve.outputs.nnphook_repository }}
          ref: ${{ needs.resolve.outputs.nnphook_ref }}
          path: native
          token: ${{ secrets.SNOWLUMA_TOKEN || github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Build qq_hook.dll (root CMake target qq_hook_dll)
        working-directory: native
        run: |
          set -euo pipefail
          cmake -S . -B build-windows -G "Visual Studio 17 2022" -A ${{ matrix.cmake_arch }}
          cmake --build build-windows --config Release --target qq_hook_dll --parallel
          test -f "build-windows/Release/qq_hook.dll"

      - name: Build injector_addon.node (cmake-js, src/windows/injector_addon)
        working-directory: native/src/windows/injector_addon
        run: |
          set -euo pipefail
          npm ci --no-fund --no-audit
          npx --no-install cmake-js rebuild

      - name: Stage Windows artifacts with canonical names
        working-directory: native
        run: |
          set -euo pipefail

          # cmake-js may emit into build/Release/ (Visual Studio generator)
          # or build/ (single-config generator). Locate the addon binary:
          node_path=""
          for candidate in \
              src/windows/injector_addon/build/Release/injector_addon.node \
              src/windows/injector_addon/build/injector_addon.node; do
            if [ -f "${candidate}" ]; then
              node_path="${candidate}"
              break
            fi
          done
          if [ -z "${node_path}" ]; then
            echo "injector_addon.node not found under src/windows/injector_addon/build" >&2
            ls -laR src/windows/injector_addon/build || true
            exit 1
          fi

          mkdir -p "out/win32-${{ matrix.arch }}"
          cp "build-windows/Release/qq_hook.dll" \
             "out/win32-${{ matrix.arch }}/snowluma-win32-${{ matrix.arch }}.dll"
          cp "${node_path}" \
             "out/win32-${{ matrix.arch }}/snowluma-win32-${{ matrix.arch }}.node"
          ls -lah "out/win32-${{ matrix.arch }}"

      - name: Verify Windows native outputs have no PDB / debug directory
        working-directory: native
        run: |
          set -euo pipefail
          # CMake configs (root + injector_addon) already pass /DEBUG:NONE in
          # Release, so neither a sibling .pdb nor an IMAGE_DEBUG_DIRECTORY
          # entry should exist. Sanity-check both.
          for f in "out/win32-${{ matrix.arch }}/snowluma-win32-${{ matrix.arch }}.dll" \
                   "out/win32-${{ matrix.arch }}/snowluma-win32-${{ matrix.arch }}.node"; do
            test -f "${f}"
            pdb="${f%.*}.pdb"
            if [ -f "${pdb}" ]; then
              echo "Unexpected sibling PDB found: ${pdb}" >&2
              exit 1
            fi
          done

      - name: Upload native outputs
        uses: actions/upload-artifact@v7
        with:
          name: native-win32-${{ matrix.arch }}
          path: |
            native/out/win32-${{ matrix.arch }}/snowluma-win32-${{ matrix.arch }}.dll
            native/out/win32-${{ matrix.arch }}/snowluma-win32-${{ matrix.arch }}.node
          if-no-files-found: error
          retention-days: 7

  release:
    needs:
      - resolve
      - build-native-linux
      - build-native-windows
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      release_url: ${{ steps.publish.outputs.url }}
    steps:
      - name: Download native outputs
        uses: actions/download-artifact@v7
        with:
          pattern: native-*
          path: release-assets
          merge-multiple: true

      - name: Show downloaded assets
        run: |
          set -euo pipefail
          ls -lah release-assets
          for f in release-assets/snowluma-linux-x64.node \
                   release-assets/snowluma-linux-x64.so \
                   release-assets/snowluma-linux-arm64.node \
                   release-assets/snowluma-linux-arm64.so \
                   release-assets/snowluma-win32-x64.node \
                   release-assets/snowluma-win32-x64.dll; do
            test -f "${f}" || { echo "Missing ${f}" >&2; exit 1; }
          done

      - name: Compute SHA-256 manifest
        working-directory: release-assets
        run: |
          set -euo pipefail
          sha256sum \
            snowluma-linux-x64.node \
            snowluma-linux-x64.so \
            snowluma-linux-arm64.node \
            snowluma-linux-arm64.so \
            snowluma-win32-x64.node \
            snowluma-win32-x64.dll \
            | tee SHA256SUMS.txt

      - name: Publish GitHub Release
        id: publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.release_tag }}
          name: ${{ needs.resolve.outputs.release_tag }}
          body: |
            Automated SnowLuma native build.

            Files:
            - `snowluma-linux-x64.node`
            - `snowluma-linux-x64.so`
            - `snowluma-linux-arm64.node`
            - `snowluma-linux-arm64.so`
            - `snowluma-win32-x64.node`
            - `snowluma-win32-x64.dll`
            - `SHA256SUMS.txt`
          files: |
            release-assets/snowluma-linux-x64.node
            release-assets/snowluma-linux-x64.so
            release-assets/snowluma-linux-arm64.node
            release-assets/snowluma-linux-arm64.so
            release-assets/snowluma-win32-x64.node
            release-assets/snowluma-win32-x64.dll
            release-assets/SHA256SUMS.txt
          fail_on_unmatched_files: true

  open-snowluma-pr:
    needs:
      - resolve
      - build-native-linux
      - build-native-windows
      - release
    if: needs.resolve.outputs.open_pr == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Validate GitHub App credentials
        env:
          APP_ID: ${{ secrets.SNOWLUMA_BOT_APP_ID }}
          PRIVATE_KEY: ${{ secrets.SNOWLUMA_BOT_PRIVATE_KEY }}
        run: |
          if [ -z "${APP_ID}" ] || [ -z "${PRIVATE_KEY}" ]; then
            echo "Missing secret SNOWLUMA_BOT_APP_ID and/or SNOWLUMA_BOT_PRIVATE_KEY" >&2
            echo "Create a GitHub App and install it on the target SnowLuma repo." >&2
            exit 1
          fi

      - name: Mint GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.SNOWLUMA_BOT_APP_ID }}
          private-key: ${{ secrets.SNOWLUMA_BOT_PRIVATE_KEY }}
          owner: ${{ needs.resolve.outputs.snowluma_repository_owner }}
          repositories: ${{ needs.resolve.outputs.snowluma_repository_name }}

      - name: Resolve bot identity
        id: bot
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          set -euo pipefail
          bot_login="${APP_SLUG}[bot]"
          bot_id="$(gh api "/users/${bot_login}" --jq .id)"
          bot_email="${bot_id}+${bot_login}@users.noreply.github.com"
          bot_identity="${bot_login} <${bot_email}>"
          {
            echo "login=${bot_login}"
            echo "id=${bot_id}"
            echo "email=${bot_email}"
            echo "identity=${bot_identity}"
          } >> "${GITHUB_OUTPUT}"
          echo "Resolved bot: ${bot_identity}"

      - name: Checkout SnowLuma
        uses: actions/checkout@v6
        with:
          repository: ${{ needs.resolve.outputs.snowluma_repository }}
          ref: ${{ needs.resolve.outputs.snowluma_base_branch }}
          token: ${{ steps.app-token.outputs.token }}
          path: SnowLuma

      - name: Download native outputs
        uses: actions/download-artifact@v7
        with:
          pattern: native-*
          path: native-artifacts
          merge-multiple: true

      - name: Replace native artifacts in SnowLuma
        run: |
          set -euo pipefail
          dest="SnowLuma/packages/runtime/native"
          mkdir -p "${dest}"
          install -m 644 native-artifacts/snowluma-linux-x64.node   "${dest}/snowluma-linux-x64.node"
          install -m 644 native-artifacts/snowluma-linux-x64.so     "${dest}/snowluma-linux-x64.so"
          install -m 644 native-artifacts/snowluma-linux-arm64.node "${dest}/snowluma-linux-arm64.node"
          install -m 644 native-artifacts/snowluma-linux-arm64.so   "${dest}/snowluma-linux-arm64.so"
          install -m 644 native-artifacts/snowluma-win32-x64.node   "${dest}/snowluma-win32-x64.node"
          install -m 644 native-artifacts/snowluma-win32-x64.dll    "${dest}/snowluma-win32-x64.dll"

          echo "## Files staged for PR" >> "${GITHUB_STEP_SUMMARY}"
          (cd SnowLuma && git status --short packages/runtime/native) | tee -a "${GITHUB_STEP_SUMMARY}"

      - name: Create or update Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          path: SnowLuma
          token: ${{ steps.app-token.outputs.token }}
          base: ${{ needs.resolve.outputs.snowluma_base_branch }}
          branch: native/auto-update-${{ needs.resolve.outputs.release_tag }}
          delete-branch: true
          committer: ${{ steps.bot.outputs.identity }}
          author: ${{ steps.bot.outputs.identity }}
          add-paths: |
            packages/runtime/native/snowluma-linux-x64.node
            packages/runtime/native/snowluma-linux-x64.so
            packages/runtime/native/snowluma-linux-arm64.node
            packages/runtime/native/snowluma-linux-arm64.so
            packages/runtime/native/snowluma-win32-x64.node
            packages/runtime/native/snowluma-win32-x64.dll
          commit-message: |
            chore(native): replace native artifacts (${{ needs.resolve.outputs.release_tag }})

            Build: ${{ needs.release.outputs.release_url }}
          title: "chore(native): replace native artifacts (${{ needs.resolve.outputs.release_tag }})"
          body: |
            Automated replacement of native artifacts under
            `packages/runtime/native/`.

            | File | |
            | ---- | --- |
            | `packages/runtime/native/snowluma-linux-x64.node`   | replaced |
            | `packages/runtime/native/snowluma-linux-x64.so`     | replaced |
            | `packages/runtime/native/snowluma-linux-arm64.node` | replaced |
            | `packages/runtime/native/snowluma-linux-arm64.so`   | replaced |
            | `packages/runtime/native/snowluma-win32-x64.node`   | replaced |
            | `packages/runtime/native/snowluma-win32-x64.dll`    | replaced |

            - Release: ${{ needs.release.outputs.release_url }}
          labels: |
            native
            automation
